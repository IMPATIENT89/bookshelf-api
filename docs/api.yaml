openapi: "3.0.1"
info:
  title: BookShelf API
  version: v1
  description: |
    Personal library management API — Authors resource.

    ## Base URL
    ```
    http://localhost:3000
    ```

    ## Response Envelope
    - Success: `{ "data": ..., "meta": { ... } }` (meta only on list endpoints)
    - Error: `{ "error": { "code": "...", "message": "...", "details": [...] } }`

    ## curl examples

    ```bash
    # List authors
    curl http://localhost:3000/api/authors

    # List authors sorted by book_count descending
    curl "http://localhost:3000/api/authors?sort_by=book_count&sort_order=desc"

    # Search authors
    curl "http://localhost:3000/api/authors?search=marquez"

    # Get a single author
    curl http://localhost:3000/api/authors/1

    # Create an author
    curl -X POST http://localhost:3000/api/authors \
      -H "Content-Type: application/json" \
      -d '{"author":{"first_name":"Gabriel","last_name":"García Márquez","birth_year":1927}}'

    # Update an author
    curl -X PUT http://localhost:3000/api/authors/1 \
      -H "Content-Type: application/json" \
      -d '{"author":{"bio":"Colombian novelist and Nobel laureate"}}'

    # Delete an author
    curl -X DELETE http://localhost:3000/api/authors/1

    # List books by author
    curl http://localhost:3000/api/authors/1/books
    ```

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Authors
    description: Manage authors

paths:
  /api/authors:
    get:
      summary: List authors
      description: Returns a paginated, sortable, filterable list of authors.
      tags: [Authors]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [last_name, first_name, created_at, book_count]
            default: last_name
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: search
          in: query
          required: false
          description: Case-insensitive partial match on first_name and last_name
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of authors
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthorListItem"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
              example:
                data:
                  - id: 1
                    first_name: Gabriel
                    last_name: "García Márquez"
                    bio: "Colombian novelist..."
                    birth_year: 1927
                    death_year: 2014
                    website: "https://example.com"
                    book_count: 5
                    created_at: "2026-04-03T10:00:00Z"
                    updated_at: "2026-04-03T10:00:00Z"
                meta:
                  page: 1
                  per_page: 20
                  total_items: 47
                  total_pages: 3
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      summary: Create an author
      tags: [Authors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
            example:
              author:
                first_name: Gabriel
                last_name: "García Márquez"
                bio: "Colombian novelist..."
                birth_year: 1927
                death_year: 2014
                website: "https://example.com"
      responses:
        "201":
          description: Author created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthorListItem"
              example:
                data:
                  id: 1
                  first_name: Gabriel
                  last_name: "García Márquez"
                  bio: "Colombian novelist..."
                  birth_year: 1927
                  death_year: 2014
                  website: "https://example.com"
                  book_count: 0
                  created_at: "2026-04-03T10:00:00Z"
                  updated_at: "2026-04-03T10:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/authors/{id}:
    get:
      summary: Get an author
      description: Returns a single author with book_count and recent_books (last 5 by date_added desc).
      tags: [Authors]
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Author details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthorDetail"
              example:
                data:
                  id: 1
                  first_name: Gabriel
                  last_name: "García Márquez"
                  bio: "Colombian novelist..."
                  birth_year: 1927
                  death_year: 2014
                  website: "https://example.com"
                  book_count: 5
                  recent_books:
                    - id: 42
                      title: "One Hundred Years of Solitude"
                      genre: Fiction
                      rating: 4.5
                      read_status: read
                      published_year: 1967
                    - id: 41
                      title: "Chronicle of a Death Foretold"
                      genre: Fiction
                      rating: 4.0
                      read_status: read
                      published_year: 1981
                  created_at: "2026-04-03T10:00:00Z"
                  updated_at: "2026-04-03T10:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update an author
      description: Partial updates supported — only include fields to change.
      tags: [Authors]
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorInput"
            example:
              author:
                last_name: "Garcia Marquez"
      responses:
        "200":
          description: Author updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AuthorListItem"
              example:
                data:
                  id: 1
                  first_name: Gabriel
                  last_name: "Garcia Marquez"
                  bio: "Colombian novelist..."
                  birth_year: 1927
                  death_year: 2014
                  website: "https://example.com"
                  book_count: 5
                  created_at: "2026-04-03T10:00:00Z"
                  updated_at: "2026-04-03T10:30:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete an author
      description: Fails with 409 if the author has associated books.
      tags: [Authors]
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          description: Author deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Author has associated books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: DEPENDENCY_EXISTS
                  message: "Cannot delete author: 5 books are associated with this author"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/authors/{id}/books:
    get:
      summary: List books by author
      description: Returns paginated books for a specific author, sorted by book fields.
      tags: [Authors]
      parameters:
        - $ref: "#/components/parameters/id"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [title, published_year, date_added, rating, page_count]
            default: date_added
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated list of books by this author
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
              example:
                data:
                  - id: 42
                    title: "One Hundred Years of Solitude"
                    genre: Fiction
                    rating: 4.5
                    read_status: read
                    published_year: 1967
                meta:
                  page: 1
                  per_page: 20
                  total_items: 5
                  total_pages: 1
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer

    page:
      name: page
      in: query
      required: false
      description: Page number (default 1)
      schema:
        type: integer
        default: 1
        minimum: 1

    per_page:
      name: per_page
      in: query
      required: false
      description: Items per page (default 20, max 100)
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    AuthorInput:
      type: object
      properties:
        author:
          type: object
          required: [first_name, last_name]
          properties:
            first_name:
              type: string
              maxLength: 100
              description: "Required, 1–100 characters"
            last_name:
              type: string
              maxLength: 100
              description: "Required, 1–100 characters"
            bio:
              type: string
              maxLength: 2000
              nullable: true
            birth_year:
              type: integer
              nullable: true
              description: Must be ≤ current year
            death_year:
              type: integer
              nullable: true
              description: Must be ≥ birth_year if both present
            website:
              type: string
              nullable: true
              description: Valid URL format (http/https)

    AuthorListItem:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        bio:
          type: string
          nullable: true
        birth_year:
          type: integer
          nullable: true
        death_year:
          type: integer
          nullable: true
        website:
          type: string
          nullable: true
        book_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AuthorDetail:
      allOf:
        - $ref: "#/components/schemas/AuthorListItem"
        - type: object
          properties:
            recent_books:
              type: array
              description: Last 5 books by date_added descending
              items:
                $ref: "#/components/schemas/BookSummary"

    BookSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        genre:
          type: string
        rating:
          type: number
          format: float
          nullable: true
        read_status:
          type: string
          enum: [unread, reading, read]
        published_year:
          type: integer
          nullable: true

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [VALIDATION_ERROR, NOT_FOUND, CONFLICT, DEPENDENCY_EXISTS, BAD_REQUEST, INTERNAL_ERROR]
            message:
              type: string
            details:
              type: array
              nullable: true
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: BAD_REQUEST
              message: "Content-Type must be application/json"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: "Author with id '999' not found"

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: Validation failed
              details:
                - field: first_name
                  message: "can't be blank"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_ERROR
              message: "An unexpected error occurred"
